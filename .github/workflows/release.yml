name: Release

on:
  release:
    types:
      - created

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.SUPACLAW_TOKEN  }}
        with:
          tagName: v__VERSION__
          releaseName: 'OpenClaw Desktop Wizard v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: '--bundles msi'

      - name: Upload Windows x64 MSI
        env:
          GITHUB_TOKEN: ${{ secrets.SUPACLAW_TOKEN }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $version = $tag.TrimStart('v')
          $msiSrc = "src-tauri/target/release/bundle/msi/OpenClaw Desktop Wizard_${version}_x64_en-US.msi"
          $msiDest = "openclaw-desktop_${version}_x64.msi"
          Copy-Item $msiSrc $msiDest
          gh release upload $tag $msiDest --clobber

      - name: Upload Windows x64 executable
        env:
          GITHUB_TOKEN: ${{ secrets.SUPACLAW_TOKEN  }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $version = $tag.TrimStart('v')
          $exeName = "openclaw-desktop_${version}_x64.exe"
          Copy-Item "src-tauri/target/release/openclaw-desktop.exe" $exeName
          gh release upload $tag $exeName --clobber
